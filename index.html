<!DOCTYPE html>
<html>
  <head>
    <title>Currency Converter App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <nav class="navbar">
      <div class="nav-left">
        <img src="kingbank.png" class="nav-icon">
        <span class="nav-title">Bank Best Kings</span>
      </div>
    </nav>

    <div class="container">
      <h1>Currency Converter</h1>
      <form id="converterForm">
        <label>Amount to Convert:</label>
        <input type="number" id="inputAmount" placeholder="Enter amount" required />

        <label>From:</label>
        <select id="fromCurrency">
          <option value="USD">USD</option>
          <option value="SGD">SGD</option>
          <option value="MYR">MYR</option>
          <option value="EUR">EUR</option>
          <option value="AUD">AUD</option>
        </select>

        <label>To:</label>
        <select id="toCurrency">
          <option value="USD">USD</option>
          <option value="SGD">SGD</option>
          <option value="MYR">MYR</option>
          <option value="EUR">EUR</option>
          <option value="AUD">AUD</option>
        </select>

        <div class="buttons">
          <button type="button" onclick="convertCurrency()">Convert</button>
          <button type="button" onclick="resetApp()">Reset</button>
        </div>
      </form>

      <div id="convertedAmount"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
